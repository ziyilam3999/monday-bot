# Monday-bot runtime configuration.
#
# This file holds non-secret operational tuning. Secrets (API tokens, OAuth
# creds) live in `.env` and are loaded by `src/config/env.ts`.
#
# US-11 introduced this top-level structure: human-readable, hand-editable,
# and read by `src/config/config.ts` via `loadConfig()`. Add new operational
# settings here rather than wiring more env vars.

# Filesystem location where the vector index, embed cache, and other
# generated runtime artefacts are persisted. Relative to CWD.
indexPath: ./tmp/index

# Confluence sync settings. US-07 introduced this section. The sync module
# reads `schedule` (a cron expression in standard 5-field form) to decide how
# often to refresh pages. Defaults to every 6 hours; tighten for fast-moving
# spaces, loosen for static reference docs.
confluence:
  # Cron expression — minute hour day month weekday. Defaults to every 6 hours.
  schedule: "0 */6 * * *"
  # Confluence space keys to sync. Empty list disables scheduled sync; on-demand
  # syncSpace(...) calls still work.
  spaces: []
  # Cap on pages fetched per sync run; protects against runaway fan-out on huge
  # spaces. The REST API call uses ?limit=<this> per page.
  pageLimit: 100

# Jira sync settings (#1168). The project keys, Atlassian host, email and API
# token all come from env (JIRA_PROJECTS reuses the Confluence URL/email/token)
# because this file is committed to a public repo. Only the cron cadence lives
# here. Defaults to every 6 hours, mirroring confluence.schedule.
jira:
  # Cron expression — minute hour day month weekday. Defaults to every 6 hours.
  schedule: "0 */6 * * *"

# Top-level alias mirroring confluence.schedule for callers that want a
# single, unambiguous "the bot's primary schedule" knob. Keep in sync with
# confluence.schedule unless you intentionally want a separate cadence.
confluenceSchedule: "0 */6 * * *"

# Recall v2 ranking levers (#1191). These shape how retrieved passages are
# ranked before the LLM answers. Defaults below are LIVE in production (threaded
# into KnowledgeService at startup). Each lever is independently toggleable so it
# can be measured and disabled on its own.
recall:
  # Lever 1 — rule-based query expansion for geo/availability questions. When a
  # question carries geo intent ("which places have the service"), launch/market
  # vocabulary is appended before embedding so the answer doc (which speaks
  # "markets/regions/launch") is no longer buried by vocabulary mismatch.
  queryExpansion:
    enabled: true
  # Lever 3 — per-source-type diversity cap. Stops one source type (e.g. a swarm
  # of short Jira tickets) from monopolizing every top slot, leaving room for a
  # how-to page. maxPerSourceType is half of the top-K window (12).
  diversityCap:
    enabled: true
    maxPerSourceType: 6
  # Lever 2 — cross-encoder rerank over a wider candidate pool. Heavier + needs a
  # model download, so default OFF (measure-first). Flip ON only after a
  # real-corpus run shows it improves rank over expansion+cap alone.
  rerank:
    enabled: false
    candidatePool: 150
  # Lever 4 (#1197) — how-to-action doc-over-ticket prior. On a genuine "how do
  # I…" / "how to…" question, narrative DOC passages get a SMALL additive score
  # bonus so a how-to page rises above the bare ticket stubs the bi-encoder
  # over-ranked on keyword density. Fires ONLY on how-to-action intent (a tight,
  # unit-tested classifier that EXCLUDES "how are you" greetings and capacity/
  # frequency/pricing "how many/often/much" questions); chit-chat / geo /
  # not-in-corpus queries are untouched, so the abstain controls stay clean.
  # Cheap + always-on (unlike rerank). bonus is the single tuning knob: 0.15 is
  # the minimal value that clears the measured ticket-gap and lands the how-to
  # doc at rank #1 — the rank at which the LLM leads with it and grounds (#1201).
  # (0.10 only reached rank #3, where the doc stays below two tickets and the bot
  # still abstains; 0.20 over-promotes to a doc-monopoly top-5, the overfit smell.)
  docPrior:
    enabled: true
    bonus: 0.15
  # Bi-encoder search pool size used when rerank OR diversityCap is enabled (a
  # wider pool than top-K so a lower-ranked-but-relevant passage can be recovered).
  candidatePoolSize: 150
